<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SourcingTree Apps</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <header>
        <h1>SourcingTree Apps</h1>
        <p>macOS / iOS 앱 다운로드</p>
    </header>
    <main id="app-list">
        <div class="app-card" id="kpoptubeadmin">
            <div class="app-icon"><img src="assets/icons/kpoptubeadmin.png" alt="KpopTubeAdmin" /></div>
            <div class="app-info">
                <h2>KpopTube Admin</h2>
                <p class="app-desc">KpopTube 관리용 macOS 앱</p>
                <p class="app-version" data-app="kpoptubeadmin">버전 확인 중...</p>
                <a class="download-btn" data-app="kpoptubeadmin" href="#">다운로드</a>
            </div>
        </div>
        <div class="app-card" id="adremoveradmin">
            <div class="app-icon"><img src="assets/icons/adremoveradmin.png" alt="ADRemoverAdmin" /></div>
            <div class="app-info">
                <h2>AD Remover Admin</h2>
                <p class="app-desc">광고 차단 관리 macOS 앱</p>
                <p class="app-version" data-app="adremoveradmin">버전 확인 중...</p>
                <a class="download-btn" data-app="adremoveradmin" href="#">다운로드</a>
            </div>
        </div>
        <div class="app-card" id="launchbay">
            <div class="app-icon"><img src="assets/icons/launchbay.png" alt="LaunchBay" /></div>
            <div class="app-info">
                <h2>LaunchBay</h2>
                <p class="app-desc">macOS 앱 빌드/배포 도구</p>
                <p class="app-version" data-app="launchbay">버전 확인 중...</p>
                <a class="download-btn" data-app="launchbay" href="#">다운로드</a>
            </div>
        </div>
    </main>
    <footer>
        <p>SourcingTree &copy; 2026</p>
    </footer>
    <script src="assets/main.js"></script>
</body>
</html>
